name: Poll MWA API → Firebase

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch MWA API and push to Firebase
        run: |
          node << 'EOF'
          const https = require('https');

          const DB_URL    = 'https://frc-contour-default-rtdb.asia-southeast1.firebasedatabase.app';
          const DB_SECRET = process.env.FIREBASE_DB_SECRET;
          const API_URL   = 'https://twqonline.mwa.co.th/TWQMSServicepublic/api/mwaonmobile/getStations';

          https.get(API_URL, (res) => {
            let raw = '';
            res.on('data', d => raw += d);
            res.on('end', async () => {
              try {
                const json = JSON.parse(raw);
                const arr = Array.isArray(json) ? json
                          : Array.isArray(json.data) ? json.data
                          : Object.values(json).find(v => Array.isArray(v)) || [];

                const now = Date.now();
                const live = {};
                const hist = {};

                for (const st of arr) {
                  const id = st.stationCode || st.id;
                  if (!id) continue;

                  // field ถูกต้องตาม API จริง
                  const frc = parseFloat(st.value?.frc_2 ?? 0);
                  const ec  = parseFloat(st.value?.ecm_5 ?? 0);

                  const safeId = String(id).replace(/[.#$\/\[\]]/g, '_');
                  live[safeId] = { frc, ec, ts: now };
                  hist[safeId + '/' + now] = { frc, ec, ts: now };
                }

                console.log('Stations:', Object.keys(live).length);
                console.log('Sample SP01:', JSON.stringify(live['SP01']));

                // push live
                const r1 = await fetch(DB_URL + '/live.json?auth=' + DB_SECRET,
                  { method: 'PUT', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(live) });
                console.log('live PUT:', r1.status);

                // push history
                const r2 = await fetch(DB_URL + '/history.json?auth=' + DB_SECRET,
                  { method: 'PATCH', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(hist) });
                console.log('history PATCH:', r2.status);

              } catch(e) {
                console.error('Error:', e.message);
                process.exit(1);
              }
            });
          }).on('error', e => { console.error(e.message); process.exit(1); });
          EOF
        env:
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
